name: Release to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build sdist & wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install --require-hashes -r requirements/build.txt

      - name: Build distributions
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          attestations: true

  # Supply-chain: SBOM + Sigstore signatures + a GitHub Release with assets.
  # NOTE: this job is intentionally non-blocking (continue-on-error) so it can
  # never break the PyPI publish. The pip installs below are unpinned pending a
  # hashed requirements file; pin exact versions and verify on the first tag.
  supply-chain:
    name: SBOM + signed release assets
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    permissions:
      contents: write   # create the GitHub Release and upload assets
      id-token: write    # Sigstore keyless signing (OIDC)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Download distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/
      - name: Generate CycloneDX SBOM
        run: |
          pip install cyclonedx-bom
          pip install dist/*.whl
          cyclonedx-py environment -o groundlens.cdx.json
      - name: Sign distributions with Sigstore
        run: |
          pip install sigstore
          python -m sigstore sign dist/*.whl dist/*.tar.gz
      - name: Create GitHub Release with assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/* groundlens.cdx.json \
            --generate-notes --verify-tag || \
          gh release upload "${GITHUB_REF_NAME}" dist/* groundlens.cdx.json --clobber
