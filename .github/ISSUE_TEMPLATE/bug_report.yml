name: Bug Report
description: Report a bug in groundlens
title: "[Bug]: "
labels: ["bug", "triage"]
assignees:
  - Javihaus
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in the details below so we can investigate.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        ```python
        from groundlens import compute_sgi
        result = compute_sgi(question="...", context="...", response="...")
        # Expected: ...
        # Actual: ...
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages and tracebacks if applicable.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: groundlens version
      description: Output of `python -c "import groundlens; print(groundlens.__version__)"`.
      placeholder: "2026.4.22"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Output of `python --version`.
      placeholder: "3.12.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of groundlens is affected?
      options:
        - Core (SGI/DGI)
        - CLI
        - Calibration
        - Provider (OpenAI)
        - Provider (Anthropic)
        - Provider (Google)
        - Integration (LangChain)
        - Integration (CrewAI)
        - Integration (Semantic Kernel)
        - Integration (AutoGen)
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other relevant information (embedding model used, calibration data, etc.).
