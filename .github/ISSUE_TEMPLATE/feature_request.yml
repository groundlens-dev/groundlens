name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
assignees:
  - Javihaus
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement. Please describe the feature and the problem it solves.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this feature solve? What is the use case?
      placeholder: "I need to detect hallucinations in streaming responses, but groundlens currently requires the full response text..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work? Include API sketches if helpful.
      placeholder: |
        ```python
        # Example API
        from groundlens import StreamingEvaluator
        evaluator = StreamingEvaluator(question="...", context="...")
        for token in llm_stream:
            score = evaluator.update(token)
            if score.flagged:
                break
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches have you considered?

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of groundlens would this affect?
      options:
        - Core (SGI/DGI)
        - CLI
        - Calibration
        - Providers
        - Integrations
        - Documentation
        - Testing
        - Other
    validations:
      required: true

  - type: dropdown
    id: willingness
    attributes:
      label: Would you be willing to contribute this?
      options:
        - "Yes, I can submit a PR"
        - "Yes, with guidance"
        - "No, but I would use it"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other relevant information, links to research papers, related issues, etc.
