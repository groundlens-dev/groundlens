strict: true
site_name: groundlens
site_description: Deterministic first-stage hallucination triage. It decides what your expensive check has to look at. Single-pass, auditable.
site_author: Javier Marin
site_url: https://docs.groundlens.dev/
repo_url: https://github.com/groundlens-dev/groundlens
repo_name: groundlens-dev/groundlens

copyright: Copyright &copy; 2025-2026 Javier Marin

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true
            members_order: source
            docstring_style: google
            merge_init_into_class: true
            show_signature_annotations: true

nav:
  - Home: index.md
  - Tutorial:
    - Overview: tutorial/index.md
    - "Part 1: Your first check": tutorial/01-first-check.md
    - "Part 2: The blind spot": tutorial/02-the-blind-spot.md
    - "Part 3: A verification loop": tutorial/03-a-verification-loop.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
    - CLI Reference: getting-started/cli.md
  - Concepts:
    - How It Works: concepts/how-it-works.md
    - "SGI: Semantic Grounding Index": concepts/sgi.md
    - "DGI: Directional Grounding Index": concepts/dgi.md
    - Calibration: concepts/calibration.md
  - Theory:
    - Hallucination Taxonomy: theory/hallucination-taxonomy.md
    - Embedding Geometry: theory/embedding-geometry.md
    - SGI Mathematics: theory/sgi-mathematics.md
    - DGI Mathematics: theory/dgi-mathematics.md
    - Confabulation Boundary: theory/confabulation-boundary.md
  - Guides:
    - RAG Verification: guides/rag-verification.md
    - Custom Encoders / No-Torch: guides/custom-encoders.md
    - Active-Learning Bootstrap (propose_labels): guides/active-learning.md
    - Domain Calibration: guides/domain-calibration.md
    - Batch Evaluation: guides/batch-evaluation.md
    - Banking Deployment: guides/banking-deployment.md
    - EU AI Act Compliance: guides/eu-ai-act.md
    - SR 11-7 Compliance: guides/sr-11-7.md
    - NIST AI RMF Mapping: guides/nist-ai-rmf.md
  - Providers:
    - OpenAI: providers/openai.md
    - Anthropic: providers/anthropic.md
    - Google Gemini: providers/google.md
  - Integrations:
    - LangGraph: integrations/langgraph.md
    - LangChain: integrations/langchain.md
    - CrewAI: integrations/crewai.md
    - Semantic Kernel: integrations/semantic-kernel.md
    - AutoGen: integrations/autogen.md
  - Benchmarks:
    - Overview: benchmarks/overview.md
    - Results: benchmarks/results.md
  - Design Decisions:
    - "ADR 0001 — Rule-set API": adr/0001-rule-set-architecture.md
  - API Reference: api/index.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.keys
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/groundlens-dev/groundlens
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/groundlens/
  generator: false

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css
