<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <!-- Gradient for sphere surface -->
    <radialGradient id="sphereGrad" cx="0.4" cy="0.35" r="0.55">
      <stop offset="0%" stop-color="#f0f4ff" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#dce4f5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#b8c8e8" stop-opacity="0.15"/>
    </radialGradient>
    <!-- Plausibility region gradient -->
    <radialGradient id="pqGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.18"/>
      <stop offset="80%" stop-color="#22c55e" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.02"/>
    </radialGradient>
    <!-- Glow for points -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Arrow marker -->
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#94a3b8" stroke-width="1"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#16a34a" stroke-width="1.2"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#7c3aed" stroke-width="1.2"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#dc2626" stroke-width="1.2"/>
    </marker>
    <marker id="arrowPink" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#db2777" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" font-size="18" font-weight="600" fill="#1e293b">Geometric Taxonomy of LLM Hallucinations on S<tspan baseline-shift="super" font-size="12">d−1</tspan></text>

  <!-- ===== SPHERE ===== -->
  <!-- Main sphere ellipse -->
  <ellipse cx="360" cy="300" rx="280" ry="220" fill="url(#sphereGrad)" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Equator line (dashed, subtle) -->
  <ellipse cx="360" cy="330" rx="270" ry="55" fill="none" stroke="#cbd5e1" stroke-width="0.8" stroke-dasharray="3,4"/>

  <!-- ===== GEODESIC ARC from q to c ===== -->
  <path d="M 175,430 Q 300,250 530,195" fill="none" stroke="#92400e" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>

  <!-- ===== PLAUSIBILITY REGION P_q ===== -->
  <ellipse cx="420" cy="280" rx="110" ry="75" fill="url(#pqGrad)" stroke="#22c55e" stroke-width="1.8" stroke-dasharray="5,3" transform="rotate(-15, 420, 280)"/>
  <!-- P_q label -->
  <text x="490" y="335" font-size="16" font-style="italic" fill="#15803d" font-weight="500">𝒫<tspan baseline-shift="sub" font-size="11">q</tspan></text>

  <!-- ===== ANGULAR ANNOTATION θ(q,c) ===== -->
  <!-- Small arc near q showing the angle -->
  <path d="M 205,410 Q 220,390 240,380" fill="none" stroke="#64748b" stroke-width="1.2"/>
  <text x="230" y="402" font-size="13" font-style="italic" fill="#475569">θ(q,c)</text>

  <!-- ===== DISPLACEMENT VECTORS ===== -->
  <!-- q → Grounded (green) -->
  <path d="M 185,425 Q 300,360 395,285" fill="none" stroke="#16a34a" stroke-width="1.8" marker-end="url(#arrowGreen)" opacity="0.7"/>

  <!-- q → Type I (purple, short — stays near q) -->
  <path d="M 185,425 Q 210,400 245,385" fill="none" stroke="#7c3aed" stroke-width="1.8" marker-end="url(#arrowPurple)" opacity="0.7"/>

  <!-- q → Type II (red, deviates strongly) -->
  <path d="M 185,425 Q 200,320 195,210" fill="none" stroke="#dc2626" stroke-width="1.8" marker-end="url(#arrowRed)" opacity="0.7"/>

  <!-- q → Type III (pink, ends in P_q) -->
  <path d="M 185,425 Q 310,370 430,305" fill="none" stroke="#db2777" stroke-width="1.8" marker-end="url(#arrowPink)" opacity="0.7"/>

  <!-- ===== POINTS ===== -->
  <!-- q (question) -->
  <circle cx="175" cy="430" r="7" fill="#1e40af" filter="url(#glow)"/>
  <text x="150" y="455" font-size="15" font-weight="600" fill="#1e40af">q</text>
  <text x="135" y="472" font-size="11" fill="#475569">(question)</text>

  <!-- c (context) -->
  <circle cx="540" cy="190" r="7" fill="#0e7490" filter="url(#glow)"/>
  <text x="553" y="188" font-size="15" font-weight="600" fill="#0e7490">c</text>
  <text x="553" y="205" font-size="11" fill="#475569">(context)</text>

  <!-- Grounded response (inside P_q) -->
  <circle cx="405" cy="280" r="6" fill="#16a34a" filter="url(#glow)"/>
  <text x="380" y="268" font-size="13" font-weight="600" fill="#16a34a">Grounded</text>

  <!-- Type I — Unfaithfulness (near q, outside P_q) -->
  <circle cx="255" cy="380" r="6" fill="#7c3aed" filter="url(#glow)"/>
  <text x="265" y="375" font-size="13" font-weight="600" fill="#7c3aed">Type I</text>
  <text x="265" y="390" font-size="10" fill="#6d28d9">(unfaithfulness)</text>

  <!-- Type II — Confabulation (far from both q and c) -->
  <circle cx="190" cy="200" r="6" fill="#dc2626" filter="url(#glow)"/>
  <text x="115" y="193" font-size="13" font-weight="600" fill="#dc2626">Type II</text>
  <text x="105" y="208" font-size="10" fill="#b91c1c">(confabulation)</text>

  <!-- Type III — Factual error within frame (inside/on boundary of P_q) -->
  <circle cx="440" cy="300" r="6" fill="#db2777" filter="url(#glow)"/>
  <text x="455" y="295" font-size="13" font-weight="600" fill="#db2777">Type III</text>
  <text x="455" y="310" font-size="10" fill="#be185d">(within-frame error)</text>

  <!-- ===== ANNOTATIONS ===== -->
  <!-- SGI annotation near the q-to-context region -->
  <rect x="520" y="240" width="150" height="38" rx="6" fill="white" fill-opacity="0.85" stroke="#0e7490" stroke-width="1"/>
  <text x="595" y="256" text-anchor="middle" font-size="11" font-weight="600" fill="#0e7490">SGI = ‖r−q‖ / ‖r−c‖</text>
  <text x="595" y="271" text-anchor="middle" font-size="10" fill="#475569">detects Type I</text>

  <!-- DGI annotation near the displacement region -->
  <rect x="65" y="260" width="145" height="38" rx="6" fill="white" fill-opacity="0.85" stroke="#dc2626" stroke-width="1"/>
  <text x="137" y="276" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">DGI = δ̂ · μ̂</text>
  <text x="137" y="291" text-anchor="middle" font-size="10" fill="#475569">detects Type II</text>

  <!-- Type III undetectable annotation -->
  <rect x="430" y="335" width="170" height="38" rx="6" fill="white" fill-opacity="0.85" stroke="#db2777" stroke-width="1"/>
  <text x="515" y="351" text-anchor="middle" font-size="11" font-weight="600" fill="#db2777">φ(r<tspan baseline-shift="sub" font-size="8">wrong</tspan>) ∈ 𝒫<tspan baseline-shift="sub" font-size="8">q</tspan></text>
  <text x="515" y="366" text-anchor="middle" font-size="10" fill="#475569">undetectable by geometry</text>

  <!-- ===== LEGEND ===== -->
  <rect x="35" y="490" width="650" height="50" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Legend items -->
  <circle cx="65" cy="515" r="5" fill="#16a34a"/>
  <text x="75" y="519" font-size="11" fill="#334155">Grounded</text>

  <circle cx="170" cy="515" r="5" fill="#7c3aed"/>
  <text x="180" y="519" font-size="11" fill="#334155">Type I (SGI &lt; 1)</text>

  <circle cx="310" cy="515" r="5" fill="#dc2626"/>
  <text x="320" y="519" font-size="11" fill="#334155">Type II (Γ ≪ E[Γ])</text>

  <circle cx="475" cy="515" r="5" fill="#db2777"/>
  <text x="485" y="519" font-size="11" fill="#334155">Type III (indistinguishable)</text>

  <line x1="620" y1="515" x2="645" y2="515" stroke="#92400e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="650" y="519" font-size="11" fill="#334155">geodesic</text>
</svg>